name: CI Workflow MLflow & Docker

on:
  push:
    paths:
      - 'Workflow-CI/**'
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy Data File
        run: |
          cp Membangun_model/data_processed.csv Workflow-CI/data_processed.csv       

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install mlflow pandas scikit-learn

      - name: Run MLflow Project
        run: |
          cd Workflow-CI
          mlflow run . --env-manager=local

      - name: Upload Artifact (Model) to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifact
          path: Workflow-CI/saved_model/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push Docker Image using MLflow
        run: |
          cd Workflow-CI
          mlflow models build-docker -m saved_model -n ${{ secrets.DOCKER_USERNAME }}/credit-scoring-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/credit-scoring-model:latest
