name: CI Workflow MLflow & Docker

on:
  push:
    paths:
      - 'Workflow-CI/**'
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install mlflow pandas scikit-learn

      - name: Run MLflow Project
        run: |
          cd Workflow-CI/MLProject
          mlflow run . --env-manager=local

      - name: Upload Artifact (Model) to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: trained-model-artifact
          path: Workflow-CI/MLProject/saved_model/

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image using MLflow
        run: |
          cd Workflow-CI/MLProject
          mlflow models build-docker -m saved_model -n ${{ secrets.DOCKER_USERNAME }}/credit-scoring-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/credit-scoring-model:latest